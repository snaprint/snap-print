<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Placed — Snap Print</title>
  <meta name="description" content="Thank you for your order!" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="./css/index.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages.css" />
</head>
<body>
  <div class="page">
    <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
      <div class="navbar__inner">
        <a href="/" class="navbar__logo" aria-label="Snap Print Home">SNAP PRINT</a>
        <div class="navbar__links"><a href="/" class="navbar__link">Shop</a><a href="/quote.html" class="navbar__link">Custom Parts</a><a href="/about.html" class="navbar__link">About</a></div>
        <div class="navbar__actions">
          <a href="/cart.html" class="cart-icon-btn" aria-label="View Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-badge hidden" id="cart-badge">0</span></a>
          <button class="navbar__hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
        </div>
      </div>
      <div class="navbar__mobile-menu" id="mobile-menu"><a href="/" class="navbar__link">Shop</a><a href="/quote.html" class="navbar__link">Custom Parts</a><a href="/about.html" class="navbar__link">About</a><a href="/cart.html" class="navbar__link">Cart</a></div>
    </nav>

    <main class="thankyou-page">
      <div class="container">
        <div class="thankyou-card">
          <div class="thankyou-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h1 class="thankyou-card__title">Order Placed! 🎉</h1>
          <p class="thankyou-card__desc">Thank you for your order! You'll receive a confirmation email shortly. We'll start working on your items right away.</p>
          <div class="thankyou-card__order-id" id="order-id-display" style="display:none;">
            <span id="order-id-text"></span>
          </div>
          <div class="flex flex-col gap-3" style="align-items:center;">
            <a href="/" class="btn btn-primary btn-lg" style="min-width:200px;">Continue Shopping</a>
            <a href="mailto:hello@snaprint.in" class="btn btn-ghost">Questions? Email Us</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer__bottom">
          <span class="footer__copy">&copy; 2026 Snap Print. All rights reserved.</span>
          <span class="footer__copy">Made in India 🇮🇳</span>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="./js/main.js"></script>
  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order');
    if (orderId) {
      const display = document.getElementById('order-id-display');
      const text = document.getElementById('order-id-text');
      if (display && text) { text.textContent = `Order: ${orderId}`; display.style.display = 'inline-flex'; }
    }
  </script>
</body>
</html>
